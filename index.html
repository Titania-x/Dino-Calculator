<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(to top,#1b2a1b,#3a5f3a);
font-family:'Poppins',sans-serif;
overflow:hidden;
}

.dino-bg{
position:absolute;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1526318472351-c75fcf070305?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
opacity:0.25;
z-index:0;
}

.calculator{
position:relative;
z-index:2;
background:#1f2d1f;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
width:320px;
border:3px solid #7bd389;
}

h1{
font-family:'Press Start 2P',cursive;
font-size:14px;
text-align:center;
color:#7bd389;
margin-bottom:15px;
}

.display{
width:100%;
height:60px;
background:#0d1a0d;
color:#7bd389;
font-size:22px;
text-align:right;
padding:10px;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2e4a2e;
color:white;
transition:0.2s;
}

button:hover{
background:#7bd389;
color:#0d1a0d;
transform:scale(1.05);
}

.equal{
background:#7bd389;
color:#0d1a0d;
}

.clear{
background:#ff6b6b;
}

.zero{
grid-column:span 2;
}

</style>

</head>

<body>

<div class="dino-bg"></div>

<div class="calculator">

<h1>🦖 DINO CALCULATOR</h1>

<div id="display" class="display">0</div>

<div class="buttons">

<button onclick="press('7')">7</button> <button onclick="press('8')">8</button> <button onclick="press('9')">9</button> <button onclick="press('/')">/</button>

<button onclick="press('4')">4</button> <button onclick="press('5')">5</button> <button onclick="press('6')">6</button> <button onclick="press('*')">*</button>

<button onclick="press('1')">1</button> <button onclick="press('2')">2</button> <button onclick="press('3')">3</button> <button onclick="press('-')">-</button>

<button onclick="press('0')" class="zero">0</button> <button onclick="press('.')">.</button> <button onclick="press('+')">+</button>

<button onclick="clearDisplay()" class="clear">C</button> <button onclick="calculate()" class="equal">=</button>

</div>

</div>

<script>

let display = document.getElementById("display");

function press(value){
if(display.innerText === "0"){
display.innerText = value;
}else{
display.innerText += value;
}
}

function clearDisplay(){
display.innerText = "0";
}

function calculate(){
try{
display.innerText = eval(display.innerText);
}catch{
display.innerText = "Error";
}
}

</script>

</body>
</html>
