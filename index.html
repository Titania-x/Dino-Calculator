<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(to top,#102a10,#2f5e2f,#6aa86a);
overflow:hidden;
}

/* 🌿 Jungle moving fog */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.08),transparent 60%);
animation:fog 6s infinite alternate;
z-index:0;
}

@keyframes fog{
from{opacity:0.2;}
to{opacity:0.5;}
}

/* 🦖 Dino background layer */
.jungle{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.dino{
position:absolute;
bottom:20px;
left:-120px;
font-size:70px;
animation:moveDino 12s linear infinite;
opacity:0.85;
}

.dino2{
position:absolute;
bottom:100px;
left:-150px;
font-size:50px;
animation:moveDino 18s linear infinite;
opacity:0.6;
}

@keyframes moveDino{
0%{
transform:translateX(0) scaleX(1);
}
49%{
transform:translateX(120vw) scaleX(1);
}
50%{
transform:translateX(120vw) scaleX(-1);
}
100%{
transform:translateX(0) scaleX(-1);
}
}

/* 🧮 Calculator box */
.calculator{
position:relative;
z-index:5;
background:rgba(20,30,20,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
width:320px;
border:3px solid #7bd389;
}

/* Title */
h1{
font-family:'Press Start 2P',cursive;
font-size:14px;
text-align:center;
color:#7bd389;
margin-bottom:15px;
}

/* Display */
.display{
width:100%;
height:60px;
background:#0b1a0b;
color:#7bd389;
font-size:22px;
text-align:right;
padding:10px;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
}

/* Buttons */
.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2e4a2e;
color:white;
transition:0.2s;
}

button:hover{
background:#7bd389;
color:#0b1a0b;
transform:scale(1.05);
}

.equal{
background:#7bd389;
color:#0b1a0b;
}

.clear{
background:#ff6b6b;
}

.zero{
grid-column:span 2;
}

</style>

</head>

<body>

<!-- 🦖 Animated background -->

<div class="jungle">
  <div class="dino">🦖</div>
  <div class="dino2">🦕</div>
</div>

<!-- 🧮 Calculator -->

<div class="calculator">

<h1>🦖 DINO CALCULATOR</h1>

<div id="display" class="display">0</div>

<div class="buttons">

<button onclick="press('7')">7</button> <button onclick="press('8')">8</button> <button onclick="press('9')">9</button> <button onclick="press('/')">/</button>

<button onclick="press('4')">4</button> <button onclick="press('5')">5</button> <button onclick="press('6')">6</button> <button onclick="press('*')">*</button>

<button onclick="press('1')">1</button> <button onclick="press('2')">2</button> <button onclick="press('3')">3</button> <button onclick="press('-')">-</button>

<button onclick="press('0')" class="zero">0</button> <button onclick="press('.')">.</button> <button onclick="press('+')">+</button>

<button onclick="clearDisplay()" class="clear">C</button> <button onclick="calculate()" class="equal">=</button>

</div>

</div>

<script>

let display = document.getElementById("display");

function press(value){
if(display.innerText === "0"){
display.innerText = value;
}else{
display.innerText += value;
}
}

function clearDisplay(){
display.innerText = "0";
}

function calculate(){
try{
display.innerText = eval(display.innerText);
}catch{
display.innerText = "Error";
}
}

</script>

</body>
</html>
